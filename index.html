<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فك التشفير</title>
    <style>
        body { background-color: black; color: #00FF00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #box { border: 2px solid #00FF00; padding: 20px; text-align: center; width: 80%; }
        input { background: black; border: 1px solid #00FF00; color: white; padding: 10px; margin-top: 20px; width: 80%; }
        button { background: #00FF00; color: black; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="box">
        <h2>[ نـظام فـك التـشـفير ]</h2>
        <p>أدخل الكود السري للوصول للبيانات:</p>
        <input type="text" id="passCode" placeholder="أدخل الرقم هنا">
        <br>
        <button onclick="check()">تـحقق</button>
        <div id="result"></div>
    </div>

    <script>
        function check() {
            var val = document.getElementById("passCode").value;
            if(val === "2026") {
                document.getElementById("box").innerHTML = "<h1>تم الاختراق بنجاح!</h1><p>الموعد: الخميس القادم <br> المكان: استراحة الأماني</p>";
            } else {
                alert("كود خاطئ!");
            }
        }
    </script>
</body>
</html>
